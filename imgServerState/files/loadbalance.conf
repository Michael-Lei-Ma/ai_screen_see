# 核心：为upstream添加故障转移参数
upstream backend {
    # 默认负载均衡策略：加权轮询（可根据需求改为ip_hash/least_conn）
    # 每个节点配置：失败3次后，10秒内不再转发请求到该节点
    server 127.0.0.1:7000 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:9000 max_fails=3 fail_timeout=10s;
    server 10.255.101.169:8000 max_fails=3 fail_timeout=10s;
    server 10.255.101.169:7000 max_fails=3 fail_timeout=10s;
    # server 10.255.50.8:7000;
    # server 10.255.50.8:8000;
    server 10.255.50.51:7000 max_fails=3 fail_timeout=10s;
    server 10.255.50.51:8000 max_fails=3 fail_timeout=10s;
    server 10.255.50.37:8000 max_fails=3 fail_timeout=10s;
    server 10.255.50.37:7000 max_fails=3 fail_timeout=10s;

    # 可选：开启慢启动（新节点上线后，逐步增加流量，避免瞬间压垮）
    # slow_start=30s;

    # 可选：全部节点故障时，是否将请求转发到所有节点（默认off）
    # proxy_next_upstream_tries 3;  # 全局重试次数（也可在location中配置）
}

server {
    listen 8000;
    server_name 10.255.100.202;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 基础超时配置（避免长连接阻塞）
        proxy_connect_timeout 5s;    # 连接后端节点超时时间
        proxy_read_timeout 60s;      # 读取后端响应超时时间
        proxy_send_timeout 60s;      # 发送请求到后端超时时间

        # ========== 核心：失败重试配置 ==========
        # 触发重试的场景：错误/超时/无效响应头/5xx状态码
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        # 最大重试次数（失败3次后停止重试，返回错误）
        proxy_next_upstream_tries 3;
        # 重试间隔（可选，避免频繁重试压垮节点）
        proxy_next_upstream_timeout 10s;

        # 可选：缓冲配置（提升大请求性能）
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 32k;
    }

    location /static/ {
       alias /home/staticfile/;
       autoindex on;
       expires 30d;
    }

    # 可选：后端节点健康检查（主动检测节点可用性）
    location /health {
        proxy_pass http://backend/health;  # 假设后端有/health健康检查接口
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        access_log off;  # 关闭健康检查日志
    }
}