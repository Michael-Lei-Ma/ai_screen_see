<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>身份证生成器</title>
  <style>
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f3f4f6;margin:0;padding:40px;color:#333;}
    .container{background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.1);padding:40px;max-width:500px;margin:auto;}
    h1{text-align:center;margin-bottom:30px;font-weight:300;color:#0d9488;}
    .date-group,.input-group{margin-bottom:20px;}
    label{display:block;margin-bottom:6px;font-weight:500;color:#555;}
    input[type=date],input[type=text]{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:16px;}
    button{width:100%;padding:12px;background:#0d9488;color:#fff;border:0;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:.3s;margin-bottom:10px;}
    button:hover{background:#0b7a6a;}
    #result{margin-top:20px;font-size:14px;color:#555;word-break:break-all;max-height:300px;overflow:auto;padding:10px;border:1px solid #e5e7eb;border-radius:8px;background:#fafafa;}
    #copyBtn {background:#2563eb;}
    #copyBtn:hover {background:#1d4ed8;}
    .tip{color:#888;font-size:12px;margin-top:4px;}
  </style>
</head>
<body>
  <div class="container">
    <h1>身份证生成器</h1>

    <div class="date-group">
      <label>开始日期</label>
      <input type="date" id="startDate" value="1978-11-01">
    </div>
    <div class="date-group">
      <label>结束日期</label>
      <input type="date" id="endDate" value="1979-10-31">
    </div>
      <div class="input-group">
      <label>身份证前6位地址码</label>
      <input type="text" id="baseInput" value="441827" maxlength="6" placeholder="例如：441827">
    </div>
    <div class="input-group">
      <label>4位顺序码（固定作为第15-18位，如8918）</label>
      <input type="text" id="seqCodeInput" value="8918" maxlength="4" placeholder="例如：8918">
      <div class="tip">4位全部作为身份证后4位，系统仅筛选符合校验规则的号码</div>
    </div>
    <button onclick="generateIds()">生成身份证号</button>
    <button id="copyBtn" onclick="copyResults()" style="display:none;">复制全部结果</button>
    <div id="result"></div>
  </div>

  <script>
  let generatedIDs = [];

  /**
   * 验证身份证号是否合法（与Python代码完全一致）
   */
  function is_valid_id(id_number) {
    if (id_number.length !== 18) return false;
    const first17 = id_number.substring(0, 17);
    if (!/^\d{17}$/.test(first17)) return false;

    const factors = [7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2];
    const check_codes = '10X98765432';
    let total = 0;
    for (let i = 0; i < 17; i++) {
      total += parseInt(id_number[i], 10) * factors[i];
    }
    const check_code = check_codes[total % 11];
    return id_number[17] === check_code; // 严格匹配，与Python一致
  }

  /**
   * 生成身份证号（完全复刻Python逻辑：后4位固定为输入的顺序码）
   */
  function generateIds() {
    const startDate = new Date(document.getElementById("startDate").value);
    const endDate = new Date(document.getElementById("endDate").value);
    const areaCode = document.getElementById("baseInput").value.trim();
    const seq4 = document.getElementById("seqCodeInput").value.trim(); // 后4位固定
    const resultElement = document.getElementById("result");
    const copyBtn = document.getElementById("copyBtn");

    // 重置结果
    resultElement.innerHTML = "";
    generatedIDs = [];

    // 输入校验
    if (startDate > endDate) {
      resultElement.innerHTML = "开始日期不能晚于结束日期！";
      copyBtn.style.display = "none";
      return;
    }
    if (!/^\d{6}$/.test(areaCode)) {
      resultElement.innerHTML = "地址码必须是6位数字！";
      copyBtn.style.display = "none";
      return;
    }
    // 4位顺序码必须是数字或最后一位为X（与Python的输入格式一致）
    if (!/^\d{3}[\dX]$/.test(seq4)) {
      resultElement.innerHTML = "顺序码必须是3位数字+1位数字或X（如8918、891X）！";
      copyBtn.style.display = "none";
      return;
    }

    // 循环生成：后4位固定为输入的seq4，仅筛选符合校验的号码
    let currentDate = new Date(startDate);
    while (currentDate <= endDate) {
      // 格式化日期为YYYYMMDD
      const year = currentDate.getFullYear();
      const month = String(currentDate.getMonth() + 1).padStart(2, '0');
      const day = String(currentDate.getDate()).padStart(2, '0');
      const dateStr = `${year}${month}${day}`;

      // 生成身份证号：地址码 + 日期 + 固定4位顺序码（与Python完全一致）
      const idNumber = areaCode + dateStr + seq4;

      // 校验并添加（仅保留符合规则的号码）
      if (is_valid_id(idNumber)) {
        generatedIDs.push(idNumber);
        resultElement.innerHTML += `${idNumber}<br>`;
      }

      // 日期递增1天
      currentDate.setDate(currentDate.getDate() + 1);
    }

    // 显示统计信息
    const xCount = generatedIDs.filter(id => id[17] === 'X').length;
    resultElement.innerHTML += `<br>共生成 ${generatedIDs.length} 个合法身份证号，其中以X结尾的有 ${xCount} 个`;
    copyBtn.style.display = generatedIDs.length > 0 ? "block" : "none";
  }

  /**
   * 复制功能（保持原有逻辑）
   */
  function copyResults() {
    if (generatedIDs.length === 0) return;
    const textToCopy = generatedIDs.join("\n");

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(textToCopy).then(() => {
        alert(`已复制 ${generatedIDs.length} 个身份证号到剪贴板！`);
      }).catch(err => {
        console.error("复制失败:", err);
        fallbackCopy(textToCopy);
      });
    } else {
      fallbackCopy(textToCopy);
    }
  }

  function fallbackCopy(text) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.select();

    try {
      const successful = document.execCommand("copy");
      alert(successful
        ? `已复制 ${generatedIDs.length} 个身份证号到剪贴板！`
        : "复制失败，请手动选择复制。");
    } catch (err) {
      alert("复制失败，请手动选择复制。");
    }

    document.body.removeChild(textarea);
  }
</script>
</body>
</html>
